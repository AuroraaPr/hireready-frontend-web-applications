<div class="avatar-circle" [class.speaking]="hablando">

    <g>

    <rect x="90" y="128" width="20" height="24" rx="6" fill="#3A3F4A"/>


    <g>

      <line x1="100" y1="34" x2="100" y2="20" stroke="#2C3444" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="100" cy="16" r="6" fill="#2C3444"/>

      <path d="M46 84 Q46 34 100 32 Q154 34 154 84" fill="none" stroke="#2C3444" stroke-width="6" stroke-linecap="round"/>
      <rect x="34" y="76" width="18" height="30" rx="8" fill="#2C3444"/>
      <rect x="148" y="76" width="18" height="30" rx="8" fill="#2C3444"/>

      <path d="M50 92 Q50 38 100 38 Q150 38 150 92 Q150 128 100 132 Q50 128 50 92 Z" fill="#F4F6F8"/>
      <path d="M50 92 Q50 38 100 38 Q150 38 150 92 Q150 100 145 104 Q140 60 100 56 Q60 60 55 104 Q50 100 50 92 Z" fill="#E2E7EC" opacity="0.6"/>

      <path d="M62 90 Q62 54 100 54 Q138 54 138 90 Q138 112 100 116 Q62 112 62 90 Z" fill="#1A2634"/>
      <ellipse cx="88" cy="72" rx="14" ry="9" fill="#243441" opacity="0.6"/>

      <ellipse cx="62" cy="122" rx="7" ry="5" fill="#2C3444"/>

      <!-- ojos -->
      <ng-container [ngSwitch]="estado">

        <g *ngSwitchCase="'listening'">
          <path d="M77 90 Q84 82 91 90" stroke="#5FD3F0" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M109 90 Q116 82 123 90" stroke="#5FD3F0" stroke-width="4" fill="none" stroke-linecap="round"/>
        </g>

        <g *ngSwitchCase="'thinking'">
          <ellipse cx="84" cy="88" rx="6.5" ry="8" fill="#5FD3F0"/>
          <path d="M75 76 Q84 72 92 75" stroke="#5FD3F0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="116" cy="86" rx="6.5" ry="8" fill="#5FD3F0"/>
        </g>

        <g *ngSwitchDefault>
          <ellipse cx="84" cy="88" rx="7" ry="9" fill="#5FD3F0"/>
          <ellipse cx="116" cy="88" rx="7" ry="9" fill="#5FD3F0"/>
        </g>
      </ng-container>

      <!-- boca -->
      <ng-container [ngSwitch]="estado">

        <path *ngSwitchCase="'listening'" d="M90 103 Q100 112 110 103" stroke="#5FD3F0" stroke-width="3.5" fill="none" stroke-linecap="round"/>

        <ng-container *ngSwitchCase="'talking'">
          <rect *ngIf="boca === 'closed'" x="93" y="105" width="14" height="3" rx="1.5" fill="#5FD3F0"/>
          <ellipse *ngIf="boca === 'small'" cx="100" cy="106" rx="5" ry="4" fill="#5FD3F0"/>
          <ellipse *ngIf="boca === 'open'" cx="100" cy="106" rx="7" ry="7" fill="#5FD3F0"/>
          <ellipse *ngIf="boca === 'round'" cx="100" cy="106" rx="4.5" ry="5.5" fill="#5FD3F0"/>
        </ng-container>

        <rect *ngSwitchDefault x="93" y="105" width="14" height="3" rx="1.5" fill="#5FD3F0"/>
      </ng-container>
    </g>
  </svg>
</div>
