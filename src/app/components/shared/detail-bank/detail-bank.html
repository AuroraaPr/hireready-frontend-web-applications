<div class="detail-dialog">

  <div class="dialog-head">
    <div class="head-text">
      <div class="head-company" *ngIf="bank.companyName">{{ bank.companyName }}</div>
      <h2>{{ bank.name }}</h2>
    </div>
    <button class="close-btn" (click)="Cerrar()" aria-label="Cerrar">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <div class="dialog-body">
    <p class="dialog-desc">{{ bank.description }}</p>

    <div class="meta-grid">
      <div class="meta-item">
        <div class="meta-label">Puesto</div>
        <div class="meta-value">{{ bank.jobPosition }}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Nivel</div>
        <div class="meta-value">{{ bank.level }}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Preguntas</div>
        <div class="meta-value">{{ bank.questions.length }}</div>
      </div>
    </div>

    <div class="section-label" *ngIf="bank.careerNames && bank.careerNames.length > 0">Carreras objetivo</div>
    <div class="chips" *ngIf="bank.careerNames && bank.careerNames.length > 0">
      <span class="chip" *ngFor="let career of bank.careerNames">{{ career }}</span>
    </div>

    <div class="section-label">Preguntas del banco</div>
    <div class="q-list">
      <div class="q-item" *ngFor="let q of bank.questions; let i = index">
        <div class="q-num">{{ i + 1 }}</div>
        <div class="q-text">{{ q.content }}</div>
      </div>
    </div>
  </div>

</div>
