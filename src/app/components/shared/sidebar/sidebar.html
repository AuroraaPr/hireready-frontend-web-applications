<aside class="sidebar">

  <div class="brand">
    <svg class="logo" width="34" height="34" viewBox="0 0 43 43" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="43" height="42.4189" rx="21.2095" fill="#0F5C4F"/>
      <path d="M21.5 6.20947C21.5 6.20947 22.2449 13.9344 25.1462 17.1581C28.0476 20.3818 35 21.2095 35 21.2095C35 21.2095 28.0476 22.0371 25.1462 25.2608C22.2449 28.4846 21.5 36.2095 21.5 36.2095C21.5 36.2095 20.7551 28.4846 17.8538 25.2608C14.9524 22.0371 8 21.2095 8 21.2095C8 21.2095 14.9524 20.3818 17.8538 17.1581C20.7551 13.9344 21.5 6.20947 21.5 6.20947Z" fill="white"/>
    </svg>
    <div class="text">
      <div class="name">HireReady</div>
      <div class="role">{{ roleLabel }}</div>
    </div>
  </div>

  <nav class="nav-list">
    <a *ngFor="let item of items"
       [routerLink]="item.route"
       routerLinkActive="active"
       class="nav-item">
      <span class="material-symbols-outlined">{{ item.icon }}</span>
      <span class="label">{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-foot">
    <button class="foot-btn" (click)="logout()">
      <span class="material-symbols-outlined">logout</span>
      <span class="label">Cerrar sesión</span>
    </button>
  </div>
</aside>
