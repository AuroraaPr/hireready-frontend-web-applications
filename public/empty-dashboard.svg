<svg viewBox="0 0 260 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Asistente HireReady analizando, aún sin datos">
  <defs>
    <linearGradient id="emptyBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF4F1"/>
      <stop offset="100%" stop-color="#E6F0F4"/>
    </linearGradient>
  </defs>

  <!-- burbujas decorativas de fondo -->
  <circle cx="38" cy="42" r="20" fill="#1B6E5E" opacity="0.06"/>
  <circle cx="224" cy="54" r="14" fill="#1B6E5E" opacity="0.06"/>
  <circle cx="210" cy="158" r="18" fill="#F2C94C" opacity="0.10"/>
  <circle cx="46" cy="150" r="12" fill="#4EC3E0" opacity="0.10"/>

  <!-- puntos de "pensando" que suben desde la cabeza -->
  <circle cx="150" cy="34" r="4.5" fill="#8A93A4" opacity="0.35"/>
  <circle cx="168" cy="24" r="6" fill="#8A93A4" opacity="0.50"/>
  <circle cx="188" cy="16" r="7.5" fill="#8A93A4" opacity="0.7"/>

  <!-- lupa flotando (buscando información) -->
  <g transform="translate(60, 70) rotate(-15)">
    <circle cx="0" cy="0" r="18" fill="#FFFFFF" stroke="#1B6E5E" stroke-width="3.5"/>
    <circle cx="0" cy="0" r="18" fill="#4EC3E0" opacity="0.15"/>
    <line x1="13" y1="13" x2="26" y2="26" stroke="#1B6E5E" stroke-width="5" stroke-linecap="round"/>
    <!-- reflejo -->
    <path d="M-8 -6 Q-10 -2 -6 2" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- robotito de HireReady (mismo estilo del banner) con expresión de análisis -->
  <g transform="translate(150, 118) scale(0.96)">
    <!-- antena -->
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#2C3444" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="-22" r="5.5" fill="#2C3444"/>
    <!-- audífonos: arco + orejeras -->
    <path d="M-50 42 Q-50 -2 0 -4 Q50 -2 50 42" fill="none" stroke="#2C3444" stroke-width="6" stroke-linecap="round"/>
    <rect x="-61" y="34" width="16" height="26" rx="8" fill="#2C3444"/>
    <rect x="45" y="34" width="16" height="26" rx="8" fill="#2C3444"/>
    <!-- cabeza -->
    <path d="M-46 50 Q-46 0 0 0 Q46 0 46 50 Q46 84 0 88 Q-46 84 -46 50 Z" fill="#F4F6F8"/>
    <!-- sombra sutil de la cabeza -->
    <path d="M-46 50 Q-46 0 0 0 Q46 0 46 50 Q46 58 42 62 Q38 20 0 16 Q-38 20 -42 62 Q-46 58 -46 50 Z" fill="#E2E7EC" opacity="0.5"/>
    <!-- visor oscuro -->
    <path d="M-35 48 Q-35 15 0 15 Q35 15 35 48 Q35 68 0 72 Q-35 68 -35 48 Z" fill="#1A2634"/>
    <!-- brillo del visor -->
    <ellipse cx="-11" cy="31" rx="12" ry="7" fill="#243441" opacity="0.6"/>
    <!-- carita "pensando": solo tres puntos tipo '...' centrados -->
    <circle cx="-12" cy="48" r="3.5" fill="#5FD3F0"/>
    <circle cx="0" cy="48" r="3.5" fill="#5FD3F0"/>
    <circle cx="12" cy="48" r="3.5" fill="#5FD3F0"/>
    <!-- corbatita de moño -->
    <path d="M0 88 L-15 82 L-15 94 Z" fill="#C25E7A"/>
    <path d="M0 88 L15 82 L15 94 Z" fill="#C25E7A"/>
    <rect x="-5" y="83" width="10" height="10" rx="2.5" fill="#A64A64"/>
  </g>
</svg>
